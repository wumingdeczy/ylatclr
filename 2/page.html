<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔞 · 阅读</title>
  <link rel="stylesheet" href="page.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page-wrapper">
    <!-- 简化导航：仅保留logo和返回主页 -->
    <header class="page-nav">
      <div class="logo-area">
        <div class="logo-icon" role="img" aria-label="r18">🔞</div>
        <span class="logo-text">好的文章</span>
      </div>
      <nav class="nav-links">
        <a href="../index.html">← 返回主页</a>
      </nav>
    </header>

    <!-- 核心阅读区域 -->
    <main class="reading-card">
      <!-- 简化文章头部：仅保留标题 -->
      
      <!-- 文章内容区 -->
      <div class="article-content" id="article-content">
        <div class="loading-placeholder" id="loadingIndicator">
          <span>🔞</span> 加载中...
        </div>
      </div>

      <!-- 简化底部：仅保留返回按钮 -->
      <div class="article-footer">
        <div class="footer-actions">
          <button class="pill-button" onclick="window.location.href='../index.html'">返回</button>
        </div>
      </div>
    </main>

    <!-- 极简页脚 -->
    <footer class="page-footer">
      <p>© 🔞文章</p>
    </footer>
  </div>

  <!-- 简化版加载脚本：仅保留核心文本加载功能 -->
  <script>
    (function() {
      const contentDiv = document.getElementById('article-content');
      const loadingIndicator = document.getElementById('loadingIndicator');

      // 加载page.txt内容
      fetch('page.txt')
        .then(response => {
          if (!response.ok) throw new Error('内容加载失败');
          return response.text();
        })
        .then(text => {
          loadingIndicator.style.display = 'none';
          
          // 文本分段处理
          const paragraphs = text.split(/\n\s*\n/).length > 1 
            ? text.split(/\n\s*\n/) 
            : text.split('\n').filter(line => line.trim() !== '');

          if (paragraphs.length === 0) {
            contentDiv.innerHTML = '<p class="empty-hint">暂无内容</p>';
            return;
          }

          const fragment = document.createDocumentFragment();
          paragraphs.forEach(para => {
            if (para.trim() === '') return;
            const p = document.createElement('p');
            p.textContent = para.trim();
            fragment.appendChild(p);
          });
          contentDiv.appendChild(fragment);
        })
        .catch(error => {
          console.warn(error);
          loadingIndicator.style.display = 'none';
          contentDiv.innerHTML = '<p class="empty-hint">内容加载失败</p>';
        });
    })();
  </script>
</body>
</html>
